services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      VECTOR_DB_PATH: /app/backend/storage/chroma
      DATABASE_URL: sqlite:////app/backend/storage/ptit_chatbot.db
      DOCUMENTS_PATH: /app/data
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      PTIT_AUTO_INGEST: ${PTIT_AUTO_INGEST:-true}
    volumes:
      - ./data:/app/data:ro
      - ./backend/app:/app/backend/app
      - ./backend/scripts:/app/backend/scripts
      - backend_storage:/app/backend/storage
    ports:
      - "8000:8000"
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
      args:
        VITE_API_BASE_URL: /api
    environment:
      VITE_API_BASE_URL: /api
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  backend_storage:
  frontend_node_modules:

